services:
  # Aplicación Laravel con PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: seguros_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
      - QUEUE_CONNECTION=database
    command: >
      sh -c "composer install --no-dev --optimize-autoloader --no-interaction &&
             chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache /var/www/html/public &&
             chmod -R 775 /var/www/html/storage /var/www/html/bootstrap/cache &&
             php-fpm"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - seguros_network
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:172.17.0.1"

  # Nginx como servidor web y proxy reverso
  nginx:
    image: nginx:alpine
    container_name: seguros_nginx
    ports:
      - "8082:80"
      - "8444:443"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - app
    networks:
      - seguros_network
    restart: unless-stopped

  # Base de datos MySQL
  mysql:
    image: mysql:8.0
    container_name: seguros_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-seguros_root_2024}
      MYSQL_DATABASE: ${DB_DATABASE:-csr_seguros}
      MYSQL_USER: ${DB_USERNAME:-csr_root}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-seguros_root_2024}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - seguros_network
    restart: unless-stopped

  # Worker para procesar colas
  queue:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: seguros_queue
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - seguros_network
    restart: unless-stopped

  # Scheduler para tareas programadas
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.production
    container_name: seguros_scheduler
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    env_file: .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=mysql
      - DB_PORT=3306
    command: >
      sh -c "while true; do
        php artisan schedule:run --verbose --no-interaction &
        sleep 60
      done"
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - seguros_network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local
  vendor_data:
    driver: local

networks:
  seguros_network:
    driver: bridge
